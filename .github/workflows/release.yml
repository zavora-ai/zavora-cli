name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (for example: v1.1.5)"
        required: true
      source_ref:
        description: "Git ref to build from (branch, tag, or sha)"
        required: false

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.vars.outputs.release_tag }}
      source_ref: ${{ steps.vars.outputs.source_ref }}
    steps:
      - id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RELEASE_TAG="${{ inputs.release_tag }}"
            SOURCE_REF="${{ inputs.source_ref }}"
            if [[ -z "${SOURCE_REF}" ]]; then
              SOURCE_REF="${RELEASE_TAG}"
            fi
          else
            RELEASE_TAG="${{ github.ref_name }}"
            SOURCE_REF="${{ github.ref }}"
          fi
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "source_ref=${SOURCE_REF}" >> "${GITHUB_OUTPUT}"

  verify:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.source_ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Release Check
        run: make release-check

  build:
    needs: [resolve, verify]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x64
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_suffix: linux-arm64
          - runner: macos-13
            target: x86_64-apple-darwin
            artifact_suffix: darwin-x64
          - runner: macos-14
            target: aarch64-apple-darwin
            artifact_suffix: darwin-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.source_ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "${GITHUB_ENV}"

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/zavora-cli dist/zavora-cli
          chmod +x dist/zavora-cli
          tar -czf "dist/zavora-cli-${{ needs.resolve.outputs.release_tag }}-${{ matrix.artifact_suffix }}.tar.gz" -C dist zavora-cli
          shasum -a 256 "dist/zavora-cli-${{ needs.resolve.outputs.release_tag }}-${{ matrix.artifact_suffix }}.tar.gz" > "dist/checksums-${{ matrix.artifact_suffix }}.txt"

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_suffix }}
          path: dist/*

  publish-release:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Build checksums manifest
        run: |
          cd dist
          rm -f checksums.txt
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          name: zavora-cli ${{ needs.resolve.outputs.release_tag }}
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

  publish-crates:
    needs: [resolve, verify]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.source_ref }}

      - name: Check crates.io token
        id: cargo_token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [[ -n "${CARGO_REGISTRY_TOKEN}" ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "CARGO_REGISTRY_TOKEN not set; skipping crates publish."
          fi

      - name: Setup Rust
        if: steps.cargo_token.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        if: steps.cargo_token.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Validate Cargo version matches tag
        if: steps.cargo_token.outputs.present == 'true'
        run: |
          TAG_VERSION="${{ needs.resolve.outputs.release_tag }}"
          TAG_VERSION="${TAG_VERSION#v}"
          CARGO_VERSION="$(sed -n 's/^version = \"\\([^\"]*\\)\"/\\1/p' Cargo.toml | head -n 1)"
          test "${TAG_VERSION}" = "${CARGO_VERSION}"

      - name: Publish crate
        if: steps.cargo_token.outputs.present == 'true'
        run: cargo publish --locked --token "${CARGO_REGISTRY_TOKEN}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    needs: [resolve, publish-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.source_ref }}

      - name: Check npm token
        id: npm_token
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -n "${NODE_AUTH_TOKEN}" ]]; then
            echo "present=true" >> "${GITHUB_OUTPUT}"
          else
            echo "present=false" >> "${GITHUB_OUTPUT}"
            echo "NPM_TOKEN not set; skipping npm publish."
          fi

      - name: Setup Node
        if: steps.npm_token.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Validate npm package version matches tag
        if: steps.npm_token.outputs.present == 'true'
        run: |
          TAG_VERSION="${{ needs.resolve.outputs.release_tag }}"
          TAG_VERSION="${TAG_VERSION#v}"
          PKG_VERSION="$(node -p "require('./npm/zavora-cli/package.json').version")"
          test "${TAG_VERSION}" = "${PKG_VERSION}"

      - name: Publish npm package
        if: steps.npm_token.outputs.present == 'true'
        working-directory: npm/zavora-cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
